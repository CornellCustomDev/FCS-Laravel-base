name: cd-fcs-base
recipe: laravel
config:
  webroot: ./public
  php: 8.4
  cache: none
  composer_version: 2-latest

services:
  appserver:
    overrides:
      volumes:
        - ${HOME}/.composer/auth.json:/var/www/.composer/auth.json:ro
    run:
      # From Laravel composer.json post-create-project-cmd
      - php artisan key:generate
      - php artisan migrate --graceful --ansi
  node:
    type: node:24
    build:
      - npm install
    run:
      - npm run build

tooling:
  npm:
    service: node
